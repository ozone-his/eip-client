## --- Spring Boot Configuration ---------------------------------------------------------------------------------------
server.port=8080
spring.application.name=Ozone EIP Client
spring.banner.charset=UTF-8
spring.banner.location=classpath:banner.txt
spring.jpa.open-in-view=false
# ----------------------------------------------------------------------------------------------------------------------

## --- Monitoring Configuration ------------------------------------------------------------------------------------------
management.endpoints.web.exposure.include=prometheus,health,info,metric

management.health.probes.enabled=true
management.endpoint.health.show-details=always
management.endpoint.prometheus.enabled=true
# ----------------------------------------------------------------------------------------------------------------------

## --- Apache Camel Configuration --------------------------------------------------------------------------------------
# The paths to the routes
camel.springboot.routes-include-pattern=classpath:camel/*.xml,classpath:routes/*.xml,file:routes/*.xml
# Keeps Camel up and running
camel.springboot.main-run-controller=true
# Camel context name
camel.springboot.name=${spring.application.name}
# ----------------------------------------------------------------------------------------------------------------------

## --- EIP Client Configuration ----------------------------------------------------------------------------------------
# Comma-separated list of packages to scan for EIP classes (components, routes, etc.)
# Default is org.openmrs.eip.*, which scans all packages under org.openmrs.eip. You can specify other different packages.
eip.app.scan.packages=org.openmrs.eip.*

# Wait for external systems BEFORE the Spring context starts.
# These values are read directly from environment variables (not Spring-managed).
# Supported endpoint schemes: http, https, tcp
# Examples: https://openmrs:8080/ws/rest/v1/session, tcp://mysql:3306
#
# EIP_STARTUP_WAIT_ENABLED        (default: false)
# EIP_STARTUP_WAIT_ENDPOINTS      (comma-separated list, default: empty)
# EIP_STARTUP_WAIT_RETRY_INTERVAL_MS (default: 10000)
# EIP_STARTUP_WAIT_MAX_WAIT_MS    (default: 1800000)
# EIP_STARTUP_WAIT_CONNECT_TIMEOUT_MS (default: 3000)
# EIP_STARTUP_WAIT_READ_TIMEOUT_MS (default: 3000)
# ----------------------------------------------------------------------------------------------------------------------
